<!-- REPLACE YOUR GRID SECTION CSS WITH THIS -->

<style>

.grid{
width:92%;
max-width:1300px;
margin:70px auto;

display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:28px;
}

.card{
background:var(--card);

border:2px solid transparent;

backdrop-filter:blur(16px);

border-radius:30px;

overflow:hidden;

box-shadow:var(--shadow);

transition:0.5s ease;

cursor:pointer;

position:relative;
}

.card::before{
content:"";

position:absolute;

inset:0;

border-radius:30px;

padding:2px;

background:linear-gradient(
135deg,
transparent,
rgba(255,255,255,0.4),
var(--accent),
transparent
);

-webkit-mask:
linear-gradient(#fff 0 0) content-box,
linear-gradient(#fff 0 0);

-webkit-mask-composite:xor;

mask-composite:exclude;

opacity:0;

transition:0.5s;
}

.card:hover::before{
opacity:1;
}

.card:hover{
transform:translateY(-12px) scale(1.02);
border-color:var(--accent);
}

.card img{
width:100%;
height:260px;
object-fit:cover;

transition:0.8s ease;
}

.card:hover img{
transform:scale(1.08);
filter:brightness(1.05);
}

.card-content{
padding:24px;
}

.card-content h3{
margin-bottom:12px;
font-size:1.15rem;
}

.card-content p{
line-height:1.8;
font-size:0.95rem;
opacity:0.82;
}

/* FLOATING ANIMATION */

.card{
animation:floatCard 5s ease-in-out infinite;
}

.card:nth-child(2){
animation-delay:1s;
}

.card:nth-child(3){
animation-delay:2s;
}

.card:nth-child(4){
animation-delay:3s;
}

.card:nth-child(5){
animation-delay:4s;
}

@keyframes floatCard{

0%{
transform:translateY(0px);
}

50%{
transform:translateY(-8px);
}

100%{
transform:translateY(0px);
}

}

</style>



<!-- REPLACE YOUR INPUT CSS WITH THIS -->

<style>

.input-box{
margin-bottom:24px;
position:relative;
}

.input-box input,
.input-box textarea{

width:100%;

padding:18px 20px;

border-radius:22px;

border:2px solid transparent;

background:rgba(255,255,255,0.12);

backdrop-filter:blur(14px);

outline:none;

font-size:1rem;

font-family:'Poppins',sans-serif;

color:var(--text);

transition:0.45s ease;

position:relative;
}

.input-box input::placeholder,
.input-box textarea::placeholder{
color:rgba(120,120,120,0.8);
}

.input-box input:hover,
.input-box textarea:hover{

border-color:rgba(255,255,255,0.25);

background:rgba(255,255,255,0.16);

}

.input-box input:focus,
.input-box textarea:focus{

border-color:var(--accent);

background:rgba(255,255,255,0.20);

box-shadow:
0 0 15px rgba(255,255,255,0.08),
0 0 25px rgba(184,155,121,0.25);

transform:scale(1.01);

}

textarea{
min-height:150px;
resize:none;
}

/* INPUT GLOW ANIMATION */

.input-box::after{

content:"";

position:absolute;

left:50%;
bottom:-2px;

width:0%;

height:2px;

background:linear-gradient(
90deg,
transparent,
var(--accent),
transparent
);

transition:0.5s ease;

transform:translateX(-50%);
}

.input-box:hover::after{
width:90%;
}

</style>
